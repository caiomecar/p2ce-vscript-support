name: build-extension
on:
  push:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: "Create Github Release"
        type: boolean
        default: true
      publish_marketplace:
        description: "Publish to VS Code Marketplace"
        type: boolean
        default: true
      publish_openvsx:
        description: "Publish to Open VSX"
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  FETCH_DEPTH: 0

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            code-target: linux-x64
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            code-target: win32-x64
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            code-target: darwin-x64
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            code-target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ env.FETCH_DEPTH }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust-target }}
          cache-targets: "true"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/code/package-lock.json
      - name: Build Server
        run: cargo build --release --target ${{ matrix.rust-target }}
      - name: Move Server
        shell: bash
        run: |
          mkdir -p editors/code/server
          BIN=tf2-vscript-ls
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN="$BIN.exe"
          fi
          cp target/${{ matrix.rust-target }}/release/$BIN editors/code/server/
      - name: Move Standard Library
        shell: bash
        run: cp -r ./vscript_lib editors/code/vscript_lib
      - name: Copy LICENSE
        run: cp LICENSE editors/code/LICENSE
      - name: Copy README
        run: cp README.md editors/code/README.md
      - name: Copy CHANGELOG
        run: cp CHANGELOG.md editors/code/CHANGELOG.md
      - name: Install Dependencies
        run: npm ci
        working-directory: editors/code
      - name: Build Extension
        run: npm run build-release
        working-directory: editors/code
      - name: Package VS Code Extension
        run: npx vsce package --target ${{ matrix.code-target }}
        working-directory: editors/code
      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: tf2-vscript-support-${{ matrix.code-target }}
          path: editors/code/*.vsix
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name ==
      'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/code/package-lock.json
      - run: npm install -g @vscode/vsce ovsx
      - name: Download All VSIXs
        uses: actions/download-artifact@v8
        with:
          pattern: tf2-vscript-support-*
          merge-multiple: true
          path: vsix
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.create_github_release
        uses: softprops/action-gh-release@v3
        with:
          files: vsix/*.vsix
          draft: true
      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_marketplace
        run: |
          for vsix in vsix/*.vsix; do
            npx vsce publish -p ${{ secrets.MARKETPLACE_TOKEN }} --packagePath "$vsix"
          done
      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_openvsx
        run: |
          for vsix in vsix/*.vsix; do
            npx ovsx publish "$vsix" -p ${{ secrets.OPENVSX_TOKEN }}
          done
