name: build-extension

on:
  push:

env:
  CARGO_INCREMENTAL: 0
  FETCH_DEPTH: 0

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            code-target: linux-x64

          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            code-target: win32-x64

          - os: macos-latest
            rust-target: x86_64-apple-darwin
            code-target: darwin-x64

          - os: macos-latest
            rust-target: aarch64-apple-darwin
            code-target: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.FETCH_DEPTH }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}

      - name: build rust
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Prepare Extension
        run: |
          mkdir -p editors/code/out
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.rust-target }}/release/tf2-vscript-ls.exe editors/code/out/server.exe
          else
            cp target/${{ matrix.rust-target }}/release/tf2-vscript-ls editors/code/out/server
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci
        working-directory: editors/code

      - name: Build Extension
        run: npm run build-release

      - name: Package VS Code Extension
        run: npx vsce package --target ${{ matrix.code-target }}
        working-directory: editors/code

      # - name: Upload VSIX
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: vscode-extension-${{ matrix.code-target }}
      #     path: vscode-extension/*.vsix


